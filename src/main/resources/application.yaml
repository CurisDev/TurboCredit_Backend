spring:
  application:
    name: TurboCredit_Backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
        naming:
          physical-strategy: api.turbocredit_backend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
      properties:
        hibernate:
          format_sql: true

  documentation:
    application:
      description: "Business Service API Documentation"
      version: "1.0.0"

  #firebase:
  #  credentials: ${FIREBASE_CREDENTIALS_PATH}

  server:
    port: 8082